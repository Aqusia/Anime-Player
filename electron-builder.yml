appId: me.anime1.netflix
productName: Anime1
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - nsis
    - portable
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
